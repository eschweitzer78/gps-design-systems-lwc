name: CodeTour watch

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  contents: read

jobs:
  codetour-watch:
    runs-on: macos-latest
    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v2

      - name: "Watch CodeTour changes"
        uses: pozil/codetour-watch@v1.4.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
